<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>Daily Habits</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:#000; --surface:#111; --surface2:#161616;
  --border:rgba(255,255,255,0.08); --border-s:rgba(255,255,255,0.18);
  --text:#fff; --muted:rgba(255,255,255,0.4); --faint:rgba(255,255,255,0.18);
  --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
  --nav:56px;
}
html,body { background:var(--bg); color:var(--text); font-family:-apple-system,'SF Pro Text',system-ui,sans-serif; min-height:100dvh; overflow-x:hidden; }

.page { display:none; flex-direction:column; min-height:100dvh; }
.page.active { display:flex; }

/* Header */
.hdr { padding:calc(var(--safe-top) + 18px) 20px 10px; flex-shrink:0; }
.hdr-date { font-size:13px; color:var(--muted); margin-bottom:2px; }
.hdr-title { font-size:28px; font-weight:700; letter-spacing:-.5px; line-height:1; }
.hdr-sub { font-size:13px; color:var(--muted); margin-top:3px; }

/* Progress */
.prog { padding:6px 20px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
.prog-track { flex:1; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; background:#fff; border-radius:2px; transition:width .4s cubic-bezier(.4,0,.2,1); }
.prog-lbl { font-size:12px; font-weight:500; color:var(--muted); min-width:36px; text-align:right; font-variant-numeric:tabular-nums; }

/* Scroll */
.scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:calc(var(--nav) + var(--safe-bot) + 16px); }
.list { padding:0 20px; }

/* Habit row */
.row { display:flex; align-items:center; gap:14px; min-height:56px; padding:10px 0; border-bottom:.5px solid var(--border); cursor:pointer; position:relative; }
.row:first-child { border-top:.5px solid var(--border); }
.row:active { opacity:.5; }
.row-emoji { font-size:20px; width:28px; text-align:center; flex-shrink:0; }
.row-info { flex:1; min-width:0; }
.row-name { font-size:16px; font-weight:400; color:var(--text); line-height:1.25; transition:color .2s; }
.row-name.done { color:var(--faint); text-decoration:line-through; text-decoration-color:rgba(255,255,255,.18); }
.row-streak { font-size:11px; color:var(--muted); margin-top:2px; }
.row-actions { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.note-btn { width:30px; height:30px; border-radius:50%; border:1px solid var(--border-s); background:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.note-btn:active { background:var(--surface); }
.note-btn svg { width:14px; height:14px; stroke:var(--muted); fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
.note-dot { width:5px; height:5px; border-radius:50%; background:#fff; position:absolute; top:12px; right:38px; }
.cb { width:26px; height:26px; border-radius:50%; border:1.5px solid var(--border-s); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s cubic-bezier(.4,0,.2,1); }
.cb.done { background:#fff; border-color:#fff; }
.cb svg { width:13px; height:13px; stroke:#000; fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; opacity:0; transform:scale(.5); transition:all .2s cubic-bezier(.4,0,.2,1); }
.cb.done svg { opacity:1; transform:scale(1); }

/* Banner */
.banner { margin:0 20px 14px; background:var(--surface); border:.5px solid var(--border-s); border-radius:12px; padding:11px 16px; display:none; align-items:center; gap:10px; flex-shrink:0; }
.banner.show { display:flex; }
.banner span { font-size:14px; color:var(--muted); }

/* Bottom nav */
.nav { position:fixed; bottom:0; left:0; right:0; height:calc(var(--nav) + var(--safe-bot)); padding-bottom:var(--safe-bot); background:rgba(0,0,0,.85); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:.5px solid var(--border); display:flex; z-index:50; }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; background:none; border:none; color:var(--muted); cursor:pointer; font-family:inherit; transition:color .15s; }
.nav-btn.active { color:#fff; }
.nav-btn svg { width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
.nav-btn span { font-size:10px; font-weight:500; letter-spacing:.03em; }

/* History */
.hist-scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 20px calc(var(--nav) + var(--safe-bot) + 20px); }
.stats-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:24px; }
.stat { background:var(--surface); border-radius:12px; padding:12px 14px; border:.5px solid var(--border); }
.stat-val { font-size:22px; font-weight:700; letter-spacing:-.5px; }
.stat-lbl { font-size:11px; color:var(--muted); margin-top:3px; line-height:1.3; }
.sec-title { font-size:12px; font-weight:600; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:12px; }
.day-card { background:var(--surface); border-radius:14px; border:.5px solid var(--border); padding:14px 16px; margin-bottom:10px; cursor:pointer; transition:opacity .12s; }
.day-card:active { opacity:.6; }
.day-card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.day-card-date { font-size:15px; font-weight:600; }
.day-score { font-size:12px; font-weight:500; color:var(--muted); background:rgba(255,255,255,.08); border-radius:20px; padding:3px 10px; }
.day-score.perfect { color:#fff; background:rgba(255,255,255,.2); }
.day-bar { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.day-fill { height:100%; background:#fff; border-radius:2px; }
.day-chips { display:flex; flex-wrap:wrap; gap:4px; margin-top:10px; }
.chip { font-size:13px; padding:3px 6px; border-radius:6px; background:rgba(255,255,255,.06); opacity:.3; }
.chip.done { opacity:1; }
.streak-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:.5px solid var(--border); }
.streak-row:first-child { border-top:.5px solid var(--border); }
.s-emoji { font-size:18px; width:24px; text-align:center; }
.s-name { flex:1; font-size:14px; color:var(--muted); }
.s-count { font-size:14px; font-weight:600; display:flex; align-items:center; gap:4px; }

/* Overlays */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:100; opacity:0; pointer-events:none; transition:opacity .3s; backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); }
.overlay.open { opacity:1; pointer-events:all; }
.sheet { position:fixed; bottom:0; left:0; right:0; background:var(--surface2); border-radius:20px 20px 0 0; z-index:101; transform:translateY(100%); transition:transform .35s cubic-bezier(.4,0,.2,1); max-height:85dvh; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.sheet.open { transform:translateY(0); }
.sheet-inner { padding:12px 20px calc(var(--safe-bot) + 20px); display:flex; flex-direction:column; gap:14px; }
.handle { width:36px; height:4px; border-radius:2px; background:rgba(255,255,255,.2); margin:0 auto 4px; flex-shrink:0; }
.sheet-hdr { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.sheet-title { font-size:17px; font-weight:600; }
.close-btn { width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,.1); border:none; color:#fff; font-size:16px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-family:inherit; }
.lbl { font-size:12px; font-weight:500; color:var(--muted); letter-spacing:.05em; text-transform:uppercase; margin-bottom:8px; }
.field { width:100%; background:rgba(255,255,255,.06); border:1px solid var(--border); border-radius:12px; color:#fff; font-size:15px; font-family:inherit; padding:12px 14px; outline:none; resize:none; }
.field:focus { border-color:var(--border-s); }
.field::placeholder { color:var(--faint); }
.save-btn { width:100%; background:#fff; color:#000; border:none; border-radius:12px; font-size:16px; font-weight:600; padding:14px; cursor:pointer; font-family:inherit; flex-shrink:0; }
.save-btn:active { opacity:.75; }
.foot { padding:0 20px 8px; flex-shrink:0; }
.reset { background:none; border:none; color:var(--faint); font-size:12px; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; font-family:inherit; padding:0; }

/* Detail */
.det-date { font-size:22px; font-weight:700; letter-spacing:-.4px; margin-bottom:4px; }
.det-sub { font-size:14px; color:var(--muted); margin-bottom:20px; }
.det-row { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:.5px solid var(--border); }
.det-row:first-of-type { border-top:.5px solid var(--border); }
.det-cb { width:20px; height:20px; border-radius:50%; border:1.5px solid var(--border-s); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.det-cb.done { background:#fff; border-color:#fff; }
.det-cb svg { width:10px; height:10px; stroke:#000; fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
.det-name { font-size:15px; color:var(--muted); }
.det-name.done { color:#fff; }
.jnote { margin-top:20px; background:rgba(255,255,255,.04); border-radius:12px; padding:14px 16px; border:.5px solid var(--border); }
.jnote-lbl { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:8px; }
.jnote-txt { font-size:14px; color:var(--muted); line-height:1.6; white-space:pre-wrap; }
</style>
</head>
<body>

<!-- TODAY -->
<div class="page active" id="page-today">
  <div class="hdr">
    <div class="hdr-date" id="dateStr"></div>
    <div class="hdr-title">Aujourd'hui</div>
  </div>
  <div class="prog">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-lbl" id="progLbl">0/14</div>
  </div>
  <div class="banner" id="banner"><span>✦</span><span>Journée parfaite. Bien joué.</span></div>
  <div class="scroll"><div class="list" id="habitList"></div>
    <div class="foot"><button class="reset" onclick="resetDay()">Réinitialiser le jour</button></div>
  </div>
</div>

<!-- HISTORY -->
<div class="page" id="page-history">
  <div class="hdr">
    <div class="hdr-title">Historique</div>
    <div class="hdr-sub" id="histSub">Chargement…</div>
  </div>
  <div class="hist-scroll" id="histScroll"></div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-today" onclick="go('today')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Aujourd'hui</span>
  </button>
  <button class="nav-btn" id="nav-history" onclick="go('history')">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span>Historique</span>
  </button>
</nav>

<!-- JOURNAL SHEET -->
<div class="overlay" id="jOverlay" onclick="closeJ()"></div>
<div class="sheet" id="jSheet">
  <div class="sheet-inner">
    <div class="handle"></div>
    <div class="sheet-hdr">
      <div class="sheet-title">Journaling</div>
      <button class="close-btn" onclick="closeJ()">✕</button>
    </div>
    <div><div class="lbl">Objectif du jour</div><textarea class="field" id="goalIn" rows="2" placeholder="Mon objectif principal…"></textarea></div>
    <div style="flex:1;display:flex;flex-direction:column"><div class="lbl">Notes</div><textarea class="field" id="notesIn" placeholder="Pensées, réflexions…" style="min-height:120px;flex:1"></textarea></div>
    <button class="save-btn" onclick="saveJ()">Enregistrer</button>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="overlay" id="dOverlay" onclick="closeD()"></div>
<div class="sheet" id="dSheet"><div class="sheet-inner" id="dInner"></div></div>

<script>
const H=[
  {id:'retention',name:'Rétention séminale',emoji:'🔒'},
  {id:'sommeil',name:'Sommeil',emoji:'🌙'},
  {id:'sport',name:'Sport',emoji:'🏊'},
  {id:'alim',name:'Alimentation',emoji:'🥗'},
  {id:'douche',name:'Douche froide',emoji:'🧊'},
  {id:'lecture',name:'Lecture',emoji:'📚'},
  {id:'journal',name:'Journaling',emoji:'✍️',note:true},
  {id:'eloquence',name:'Éloquence',emoji:'🗣️'},
  {id:'anglais',name:'Anglais shadowing',emoji:'🇬🇧'},
  {id:'yeux',name:'Regarder dans les yeux',emoji:'👁️'},
  {id:'besoin',name:'Exprimer un besoin direct',emoji:'💬'},
  {id:'posture',name:'Posture',emoji:'🧍'},
  {id:'bonjour',name:'Bonjour ancré + contact visuel',emoji:'🤝'},
  {id:'gent',name:'Être gentleman',emoji:'🎩'},
];

const DAYS=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTHS_S=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
const MONTHS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

function dkey(d){return`habits_${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`;}
function jkey(d){return`journal_${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`;}
function ld(k){try{return JSON.parse(localStorage.getItem(k)||'{}')}catch(e){return{};}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

function fmt(d){return`${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS_S[d.getMonth()]}`;}
function fmtFull(d){return`${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;}

function allDays(){
  const out=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k||!k.startsWith('habits_'))continue;
    const p=k.split('_');
    if(p.length!==4)continue;
    const d=new Date(+p[1],+p[2]-1,+p[3]);
    if(isNaN(d))continue;
    const s=ld(k);
    out.push({key:k,date:d,state:s,done:Object.values(s).filter(Boolean).length,total:H.length});
  }
  return out.sort((a,b)=>b.date-a.date);
}

function streaks(){
  const days=allDays().sort((a,b)=>a.date-b.date);
  const sets={};H.forEach(h=>{sets[h.id]=new Set();});
  days.forEach(d=>H.forEach(h=>{if(d.state[h.id])sets[h.id].add(dkey(d.date));}));
  const today=new Date();
  const res={};
  H.forEach(h=>{
    let n=0,c=new Date(today);
    while(sets[h.id].has(dkey(c))){n++;c.setDate(c.getDate()-1);}
    res[h.id]=n;
  });
  return res;
}

function go(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='history')renderHist();
}

function renderDate(){
  const d=new Date();
  document.getElementById('dateStr').textContent=`${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

function renderToday(){
  const state=ld(dkey(new Date()));
  const jdata=ld(jkey(new Date()));
  const str=streaks();
  const done=Object.values(state).filter(Boolean).length;
  document.getElementById('progFill').style.width=Math.round(done/H.length*100)+'%';
  document.getElementById('progLbl').textContent=`${done}/${H.length}`;
  document.getElementById('banner').classList.toggle('show',done===H.length);
  const c=document.getElementById('habitList');
  c.innerHTML='';
  H.forEach(h=>{
    const ok=!!state[h.id];
    const row=document.createElement('div');row.className='row';
    const em=document.createElement('div');em.className='row-emoji';em.textContent=h.emoji;
    const info=document.createElement('div');info.className='row-info';
    const nm=document.createElement('div');nm.className='row-name'+(ok?' done':'');nm.textContent=h.name;
    info.appendChild(nm);
    const s=str[h.id];
    if(s>0){const sl=document.createElement('div');sl.className='row-streak';sl.textContent=`${s} jour${s>1?'s':''} consécutif${s>1?'s':''}`;info.appendChild(sl);}
    const acts=document.createElement('div');acts.className='row-actions';
    if(h.note){
      const nb=document.createElement('button');nb.className='note-btn';
      nb.innerHTML=`<svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>`;
      nb.addEventListener('click',e=>{e.stopPropagation();openJ();});
      acts.appendChild(nb);
      if(jdata.goal||jdata.notes){const dot=document.createElement('div');dot.className='note-dot';row.appendChild(dot);}
    }
    const cb=document.createElement('div');cb.className='cb'+(ok?' done':'');
    cb.innerHTML=`<svg viewBox="0 0 12 10"><polyline points="1,5 4.5,8.5 11,1"/></svg>`;
    acts.appendChild(cb);
    row.appendChild(em);row.appendChild(info);row.appendChild(acts);
    row.addEventListener('click',()=>{const s=ld(dkey(new Date()));s[h.id]=!s[h.id];sv(dkey(new Date()),s);renderToday();});
    c.appendChild(row);
  });
}

function resetDay(){
  if(confirm('Réinitialiser toutes les habitudes du jour ?')){sv(dkey(new Date()),{});sv(jkey(new Date()),{});renderToday();}
}

function openJ(){
  const j=ld(jkey(new Date()));
  document.getElementById('goalIn').value=j.goal||'';
  document.getElementById('notesIn').value=j.notes||'';
  document.getElementById('jOverlay').classList.add('open');
  document.getElementById('jSheet').classList.add('open');
}
function closeJ(){document.getElementById('jOverlay').classList.remove('open');document.getElementById('jSheet').classList.remove('open');}
function saveJ(){
  sv(jkey(new Date()),{goal:document.getElementById('goalIn').value.trim(),notes:document.getElementById('notesIn').value.trim()});
  closeJ();renderToday();
}

function renderHist(){
  const days=allDays();
  const total=days.length;
  const perfect=days.filter(d=>d.done===d.total).length;
  document.getElementById('histSub').textContent=total===0?'Aucune donnée':`${total} jour${total>1?'s':''} · ${perfect} parfait${perfect>1?'s':''}`;
  const sc=document.getElementById('histScroll');sc.innerHTML='';
  if(total===0){sc.innerHTML='<p style="color:var(--muted);font-size:15px;padding:20px 0">Tes habitudes apparaîtront ici dès demain.</p>';return;}

  const str=streaks();
  const totalDone=days.reduce((a,d)=>a+d.done,0);
  const avg=Math.round(totalDone/total);
  const best=Math.max(...Object.values(str),0);

  const sg=document.createElement('div');sg.className='stats-grid';
  sg.innerHTML=`<div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">Jours trackés</div></div><div class="stat"><div class="stat-val">${avg}/${H.length}</div><div class="stat-lbl">Moyenne / jour</div></div><div class="stat"><div class="stat-val">${best}</div><div class="stat-lbl">Meilleur streak</div></div>`;
  sc.appendChild(sg);

  const active=H.map(h=>({...h,s:str[h.id]})).filter(h=>h.s>0).sort((a,b)=>b.s-a.s);
  if(active.length){
    const t=document.createElement('div');t.className='sec-title';t.textContent='Streaks actifs';sc.appendChild(t);
    const sl=document.createElement('div');sl.style.marginBottom='24px';
    active.forEach(h=>{const r=document.createElement('div');r.className='streak-row';r.innerHTML=`<div class="s-emoji">${h.emoji}</div><div class="s-name">${h.name}</div><div class="s-count"><span>🔥</span>${h.s}j</div>`;sl.appendChild(r);});
    sc.appendChild(sl);
  }

  const dt=document.createElement('div');dt.className='sec-title';dt.style.marginTop=active.length?'0':'0';dt.textContent='Jours passés';sc.appendChild(dt);
  days.forEach(d=>{
    const pct=Math.round(d.done/d.total*100);
    const card=document.createElement('div');card.className='day-card';
    const chips=H.map(h=>`<div class="chip${d.state[h.id]?' done':''}">${h.emoji}</div>`).join('');
    card.innerHTML=`<div class="day-card-top"><div class="day-card-date">${fmt(d.date)}</div><div class="day-score${d.done===d.total?' perfect':''}">${d.done}/${d.total}</div></div><div class="day-bar"><div class="day-fill" style="width:${pct}%"></div></div><div class="day-chips">${chips}</div>`;
    card.addEventListener('click',()=>openD(d));
    sc.appendChild(card);
  });
}

function openD(d){
  const j=ld(jkey(d.date));
  let html=`<div class="handle"></div><div class="det-date">${fmtFull(d.date)}</div><div class="det-sub">${d.done} / ${d.total} habitudes · ${Math.round(d.done/d.total*100)}%</div>`;
  H.forEach(h=>{const ok=!!d.state[h.id];html+=`<div class="det-row"><div class="det-cb${ok?' done':''}">${ok?'<svg viewBox="0 0 12 10"><polyline points="1,5 4.5,8.5 11,1"/></svg>':''}</div><div class="det-name${ok?' done':''}">${h.emoji} ${h.name}</div></div>`;});
  if(j.goal||j.notes){
    html+=`<div class="jnote">`;
    if(j.goal)html+=`<div class="jnote-lbl">Objectif</div><div class="jnote-txt" style="margin-bottom:${j.notes?'14px':'0'}">${esc(j.goal)}</div>`;
    if(j.notes)html+=`<div class="jnote-lbl">Notes</div><div class="jnote-txt">${esc(j.notes)}</div>`;
    html+=`</div>`;
  }
  document.getElementById('dInner').innerHTML=html;
  document.getElementById('dOverlay').classList.add('open');
  document.getElementById('dSheet').classList.add('open');
}
function closeD(){document.getElementById('dOverlay').classList.remove('open');document.getElementById('dSheet').classList.remove('open');}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
renderDate();
renderToday();
</script>
</body>
</html>
